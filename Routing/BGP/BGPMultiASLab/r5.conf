hostname R5
!
boot-start-marker
boot-end-marker
!
logging message-counter syslog
!
no aaa new-model
ip source-route
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
no ip domain lookup
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
!
archive
 log config
  hidekeys
! 
!
!
!
!
ip tcp synwait-time 5
!
!
!
!
interface Loopback0
 ip address 5.5.5.5 255.255.255.255
!
interface Ethernet0/0
 no ip address
 shutdown
 duplex auto
!
interface GigabitEthernet0/0
 ip address 192.168.35.5 255.255.255.0
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
interface GigabitEthernet1/0
 ip address 192.168.45.5 255.255.255.0
 negotiation auto
!
interface GigabitEthernet2/0
 ip address 192.168.57.5 255.255.255.0
 negotiation auto
!
interface GigabitEthernet3/0
 ip address 192.168.56.5 255.255.255.0
 negotiation auto
!
router bgp 4
 no synchronization
 bgp log-neighbor-changes
 network 5.5.5.5 mask 255.255.255.255
 neighbor 192.168.35.3 remote-as 3
 neighbor 192.168.45.4 remote-as 3
 neighbor 192.168.45.4 route-map WEIGHT in
 neighbor 192.168.56.6 remote-as 4
 neighbor 192.168.56.6 next-hop-self
 neighbor 192.168.57.7 remote-as 4
 neighbor 192.168.57.7 next-hop-self
 no auto-summary
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
!
route-map WEIGHT permit 10
 set weight 100
!
!
!
control-plane
!
!
!
!
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
end
